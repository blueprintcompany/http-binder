name: Build and Publish BlueprintSoftware.HttpBinder

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-generator.yml'
      - 'src/**'
      - 'README.md'
      - 'icon.png'
      - 'NuGet.config'
      - 'global.json'
      - 'BlueprintSoftware.HttpBinder.slnx'
  pull_request:
    paths:
      - '.github/workflows/publish-generator.yml'
      - 'src/**'
      - 'README.md'
      - 'icon.png'
      - 'NuGet.config'
      - 'global.json'
      - 'BlueprintSoftware.HttpBinder.slnx'
  release:
    types:
      - published
  workflow_dispatch:

env:
  PROJECT_PATH: src/BlueprintSoftware.HttpBinder.Generator/BlueprintSoftware.HttpBinder.Generator.csproj
  TEST_PROJECT_PATH: src/BlueprintSoftware.HttpBinder.Generator.Tests/BlueprintSoftware.HttpBinder.Generator.Tests.csproj

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore BlueprintSoftware.HttpBinder.slnx

      - name: Test
        run: dotnet test --project ${{ env.TEST_PROJECT_PATH }} --no-restore

      - name: Determine package version
        shell: bash
        run: |
          VERSION="1.0.0"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            VERSION="${TAG_NAME#blueprintsoftware-httpbinder-v}"
            if [[ -z "$VERSION" || "$VERSION" == "$TAG_NAME" ]]; then
              echo "Release tag must use blueprintsoftware-httpbinder-v<version> format." >&2
              exit 1
            fi
          fi
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack -c Release ${{ env.PROJECT_PATH }} -o nupkgs /p:Version=${{ env.PACKAGE_VERSION }} --no-restore

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: nupkgs
          path: nupkgs/*.nupkg

      - name: Publish to NuGet.org
        if: ${{ github.event_name == 'release' }}
        run: dotnet nuget push "nupkgs/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
