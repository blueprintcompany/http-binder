name: Publish Blueprint.HttpBinder to GitHub Packages

on:
    push: &push-trigger
        branches:
            - main
        paths:
            - '**/Blueprint.HttpBinder.Generator/**'
            - '**/Blueprint.HttpBinder.Generator.Abstractions/**'
    pull_request: *push-trigger
    release:
        types: [created]
    workflow_dispatch:
env:
  project_name: "Blueprint.HttpBinder.Generator"

permissions:
    contents: read
    packages: write

jobs:
    test:
      if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
      runs-on: &blueprint-runners
        group: blueprint-runners
        labels: Linux
      steps:
        - name: Checkout repository
          uses: actions/checkout@v6
        - name: Setup .NET
          uses: actions/setup-dotnet@v5
          with:
              dotnet-version: '9.0.x'
        - name: Run tests
          run: |
            dotnet restore
            dotnet test --project src/${{ env.project_name }}.Tests/${{ env.project_name }}.Tests.csproj
    pack-and-publish:
        if: startsWith(github.event.release.tag_name, 'http-binder-v')
        runs-on: *blueprint-runners
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '9.0.x'
                  source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
              env:
                NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
            - name: Extract version from release tag
              run: |
                  TAG_NAME="${{ github.event.release.tag_name }}"
                  VERSION="${TAG_NAME#http-binder-v}"
                  [[ -z "$VERSION" || "$VERSION" == "$TAG_NAME" ]] && VERSION="1.0.0"
                  echo "VERSION=$VERSION" >> $GITHUB_ENV
            - name: Pack NuGet package
              run: |
                dotnet restore 
                dotnet pack -c Release src/${{env.project_name}}/${{env.project_name}}.csproj -o nupkgs /p:Version=${{ env.VERSION }}
            - name: Upload NuGet package as an artifact
              uses: actions/upload-artifact@v6
              with:
                  name: drop
                  path: nupkgs/*.nupkg
            - name: Push to GitHub Packages
              run: dotnet nuget push "nupkgs/*.nupkg"
